name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # 依存パッケージは無いので install は不要(node:test を使用)。
      - name: Syntax check
        run: npm run check
      - name: Unit tests
        run: npm test
